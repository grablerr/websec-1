<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Калькулятор</title>
</head>

<body>
    <div class="ui-container roboto-500">
        <div class="content-header" id="input-container">
            <input type="number" class="input-field-number" id="first-number">
            <select class="select-field-operation">
                <option value="add">+</option>
                <option value="sub">-</option>
                <option value="mul">×</option>
                <option value="div">/</option>
            </select>
            <input type="number" class="input-field-number" id="second-number">
        </div>
        <div class="content-footer">
            <button class="button-calculate">подсчитать</button>
            <div class="result-display">
                <p class="result-previous"></p>
                <p class="result-current"></p>
            </div>
        </div>
    </div>
</body>

</html>
