<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Калькулятор</title>
</head>

<body>
    <div class="main-container roboto-500">
        <div class="top-content" id="input-container">
            <input type="number" class="input-number" id="first-number">
            <select class="select-operation">
                <option value="add">+</option>
                <option value="sub">-</option>
                <option value="mul">∗</option>
                <option value="div">/</option>
            </select>
            <input type="number" class="input-number" id="second-number">
        </div>
        <div class="bottom-content">
            <button class="calc-result">подсчитать</button>
            <div class="result-container">
                <p class="prev-result"></p>
                <p class="current-result"></p>
            </div>
        </div>
    </div>
</body>

</html>
